# =============================================================================
# PPT Master - Nginx Configuration
# Serves static files and proxies API/WebSocket requests to backend
# =============================================================================

# Upstream backend server
upstream backend {
    server backend:8000;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/s;

# Log format
log_format ppt_master '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'rt=$request_time uct="$upstream_connect_time" '
                      'uht="$upstream_header_time" urt="$upstream_response_time"';

server {
    listen 80;
    server_name _;
    
    # Logs
    access_log /var/log/nginx/access.log ppt_master;
    error_log /var/log/nginx/error.log warn;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --------------------------------------------------------------------------
    # Gzip compression
    # --------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/ttf
        font/otf
        font/x-woff
        application/vnd.ms-fontobject;

    # --------------------------------------------------------------------------
    # Health check endpoint (nginx itself)
    # --------------------------------------------------------------------------
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # --------------------------------------------------------------------------
    # WebSocket proxy (/ws/*)
    # --------------------------------------------------------------------------
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        
        # WebSocket headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts for long-lived WebSocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        
        # Disable buffering for real-time communication
        proxy_buffering off;
    }

    # --------------------------------------------------------------------------
    # API proxy (/api/*)
    # --------------------------------------------------------------------------
    location /api/ {
        # Apply rate limiting
        limit_req zone=api_limit burst=100 nodelay;
        
        proxy_pass http://backend;
        proxy_http_version 1.1;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_buffering on;
        
        # File upload endpoint - longer timeout and rate limit
        location /api/projects/[^/]+/sources/upload {
            limit_req zone=upload_limit burst=5 nodelay;
            proxy_pass http://backend;
            proxy_read_timeout 300s;
            proxy_request_buffering off;
            client_max_body_size 500M;
        }
    }

    # --------------------------------------------------------------------------
    # Static assets (JS/CSS/fonts/images) - serve directly with caching
    # --------------------------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --------------------------------------------------------------------------
    # Main application - SPA routing support
    # --------------------------------------------------------------------------
    location / {
        root /usr/share/nginx/html;
        index index.html;
        
        # SPA: redirect all routes to index.html
        try_files $uri $uri/ /index.html;
        
        # Cache HTML for a short period
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # --------------------------------------------------------------------------
    # Error pages
    # --------------------------------------------------------------------------
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # --------------------------------------------------------------------------
    # Size limits
    # --------------------------------------------------------------------------
    client_max_body_size 500M;
    client_body_buffer_size 16k;
}
